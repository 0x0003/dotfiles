pkgs:
  windows:
    scoop:
      buckets:
        - extras
        - 0x0003-s-bucket https://github.com/0x0003/0x0003-s-bucket
        - sniffer https://github.com/Locietta/sniffer
      packages:
        core:
          - 7zip
          - age
          - git
          - grep
          - less
          - which
        cli:
          - fastfetch
          - ffmpeg
          - gallery-dl
          - megatools
          - nmap
          - ntop
          - trippy
          - yt-dlp
          - curl
        dev:
          - adb
          - chezmoi
          - sioyek
        net:
          - dnscrypt-proxy
          - proxychains
          - 0x0003-s-bucket/sing-box-extended
          - tor
          - 0x0003-s-bucket/wireproxy-awg
        sys:
          - crystaldiskinfo
          - crystaldiskmark
          - koboldcpp
          - lessmsi
          - librehardwaremonitor
          - smartmontools
        apps:
          - alacritty
          - name: calibre
            version: "8.14.0"
            hold: true
          - name: fancontrol
            version: "237"
            hold: true
          - firefox-esr
          - 0x0003-s-bucket/imageglass
          - mpv
          - nicotine-plus
          - qbittorrent
          - throne
          - ungoogled-chromium
          - 0x0003-s-bucket/usque
        wsl:
          - sniffer/xanmod-WSL2
          - sniffer/xanmod-WSL2-addons
          - win32yank
