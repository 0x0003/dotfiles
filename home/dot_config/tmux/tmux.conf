# set prefix to Ctrl-s
set -g prefix C-s
bind C-s last-window

# reload config
bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# switch session from within tmux
bind e choose-session

# https://github.com/joshmedeski/sesh/
bind o run-shell "tmux-sesh.sh"

# attach to last session
# bind L switch-client -l
bind L run-shell "sesh last || true"

# kill active pane
bind x kill-pane

# pass in `prefix`
# can be used to control nested tmux sessions
bind a send-prefix

# change starting directory of new splits/windows to that of a currently active pane
bind ` attach-session -t . -c '#{pane_current_path}' \; display-message "cd #{pane_current_path}"

# copy mode
set-window-option -g mode-keys vi
bind q copy-mode
bind -T copy-mode-vi 'v' send-keys -X begin-selection
# bind -T copy-mode-vi 'y' send-keys -X copy-selection\; run "tmux save-buffer - | clip"
bind -T copy-mode-vi 'y' send-keys -X copy-selection

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# swap panes
bind J swap-pane -D
bind K swap-pane -U

# move pane to new window
bind u break-pane

# join panes (use number or part of a name as input)
bind-key y command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key i command-prompt -p "send pane to:"  "join-pane -t '%%'"

# splits
bind v split-window -h -c "#{pane_current_path}" # vertical
bind s split-window -c "#{pane_current_path}"    # horizontal

# arrow keys resize panes
bind left resize-pane -L 15
bind right resize-pane -R 15
bind down resize-pane -D 5
bind up resize-pane -U 5

# set to main-horizontal, 68% height for main pane
# bind m set-window-option main-pane-height 42 \; select-layout main-horizontal

# set to main-horizontal, 68% height for main pane
bind m run-shell "tmux-resize.sh -l main-horizontal -p 68"
# set to main-vertical, 60% width for main pane
bind M run-shell "tmux-resize.sh -l main-vertical -p 60"

# toggle mouse
bind Y set -g mouse

# toggle statusbar
bind t set -g status

# display clock in active pane
bind T clock-mode

# create new window with a static name
bind C command-prompt -p "Name of new window: " "new-window -n '%%'"

# fix pane_current_path on new window and splits
if-shell "#{$TMUX_VERSION_MAJOR} -gt 1 -o \( #{$TMUX_VERSION_MAJOR} -eq 1 -a #{$TMUX_VERSION_MINOR} -ge 8 \)" 'unbind c; bind c new-window -c "#{pane_current_path}"'
if-shell "#{$TMUX_VERSION_MAJOR} -gt 1 -o \( #{$TMUX_VERSION_MAJOR} -eq 1 -a #{$TMUX_VERSION_MINOR} -ge 8 \)" "unbind '\"'; bind '\"' split-window -v -c '#{pane_current_path}'"
if-shell "#{$TMUX_VERSION_MAJOR} -gt 1 -o \( #{$TMUX_VERSION_MAJOR} -eq 1 -a #{$TMUX_VERSION_MINOR} -ge 8 \)" 'unbind v; bind v split-window -h -c "#{pane_current_path}"'
if-shell "#{$TMUX_VERSION_MAJOR} -gt 1 -o \( #{$TMUX_VERSION_MAJOR} -eq 1 -a #{$TMUX_VERSION_MINOR} -ge 8 \)" 'unbind %; bind % split-window -h -c "#{pane_current_path}"'

# enable mouse
set -g mouse on
# dynamic OS window title
set -g set-titles on
set -g set-titles-string '#{pane_title}'
# faster key repetition
set -s escape-time 0
# constrain window size to the maximum size of any client connected to that window
set -g aggressive-resize on
# start pane index at 1
set -g pane-base-index 1
# start windows index at 1
set -g base-index 1
# renumber windows when one is closed
set -g renumber-windows on
# hightlight window with detected activity in statusbar
set -g monitor-activity off
# display message in statusbar when activity is detected
set -g visual-activity off
# automatically set window name to running command
set-window-option -g automatic-rename on
# default shell
# set -g default-command /usr/sbin/fish
# set -g default-shell /usr/sbin/fish
# truecolor
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:RGB"
# autoattach to next existing session upon closing the last window
set -g detach-on-destroy off
# emacs-style command line keybinds
set -g status-keys emacs

# statusbar setup
set -g status 'on'
set -g status-justify left
set -g status-interval 1
set -g status-position top
set -g status-style 'bg=default,fg=colour0'
set -g status-left-length '200'
set -g status-right-length '200'
set -g status-left '#{?client_prefix,#[fg=colour3] #[bg=default]#[fg=blue]#S ,#[fg=colour10] #[fg=blue]#S }'
set -g status-right '#{?client_prefix,#[bg=default]#[fg=colour3]‹‹‹ #[fg=default]%a %Y-%m-%d %H:%M, %a %Y-%m-%d %H:%M}'

# colors
set -g cursor-colour default
set -g prompt-cursor-colour default
set -g clock-mode-colour colour7
set -g window-status-separator ''
set -g window-status-current-format '#[bg=default,fg=colour5]*#I·#{?window_zoomed_flag,#[fg=colour5]#[bg=default]#[italics],#[fg=colour5,bg=default]}#W '
set -g window-status-format '#{?window_activity_flag,#[bg=colour1]#[fg=colour0],#[fg=colour0]}#I·#{?window_zoomed_flag,#[italics],#[fg=colour0,bg=default]}#[bg=default,fg=colour0]#W '
set -g message-style bg=default,fg=colour7
set -g message-command-style fg=colour7,bg=colour0
set -g window-status-style bg=default
set -g window-status-activity-style bg=colour3,fg=colour1
set -g pane-active-border-style fg=colour12,bg=default
set -g pane-border-style fg=colour8,bg=default
# uncomment the 2 options below and comment the 2 above
# if the terminal can't properly render box-drawing characters
# set -g pane-active-border-style fg=colour0,bg=colour0
# set -g pane-border-style fg=colour8,bg=colour8

# alt theme 1: more space between the elements, dim unobtrusive colors
set -g status-left '#{?client_prefix,#[fg=colour10] #[bg=default]#[fg=colour3]#S #[fg=colour3]›,#[fg=colour10] #[fg=default]#S #[fg=colour8]·}'
set -g status-right '#{?client_prefix,#[bg=default]#[fg=colour3]‹‹‹ #[fg=colour8]%a %Y-%m-%d %H:%M, #[fg=colour8]%a %Y-%m-%d %H:%M}'
set -g window-status-current-format '#[bg=default,fg=colour15] #I #{?window_zoomed_flag,#[italics],}#W *'
set -g window-status-format ' #{?window_activity_flag,#[bg=colour1]#[fg=colour0],#[fg=colour8]}#I #{?window_zoomed_flag,#[italics],#[fg=colour8,bg=default]}#[bg=default,fg=colour8]#W -'

