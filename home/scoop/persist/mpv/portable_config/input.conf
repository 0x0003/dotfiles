# volume
DOWN       osd-msg add volume -5
UP         osd-msg add volume +5
j          osd-msg add volume -5
k          osd-msg add volume +5
Shift+j    osd-msg add volume -10
Shift+k    osd-msg add volume +10
Shift+DOWN osd-msg add volume -10
Shift+UP   osd-msg add volume +10
AXIS_DOWN  osd-msg add volume -5
AXIS_UP    osd-msg add volume +5

# seeking
RIGHT       no-osd seek 5;         script-binding uosc/flash-timeline
LEFT        no-osd seek -5;        script-binding uosc/flash-timeline
l           no-osd seek 5;         script-binding uosc/flash-timeline
h           no-osd seek -5;        script-binding uosc/flash-timeline
Shift+RIGHT no-osd seek 60;        script-binding uosc/flash-timeline
Shift+LEFT  no-osd seek -60;       script-binding uosc/flash-timeline
Shift+l     no-osd seek 60;        script-binding uosc/flash-timeline
Shift+h     no-osd seek -60;       script-binding uosc/flash-timeline
Ctrl+RIGHT  no-osd seek 1 exact;   script-binding uosc/flash-timeline
Ctrl+LEFT   no-osd seek -1 exact;  script-binding uosc/flash-timeline
Ctrl+l      no-osd seek 1 exact;   script-binding uosc/flash-timeline
Ctrl+h      no-osd seek -1 exact;  script-binding uosc/flash-timeline
o           osd-msg show-progress; script-binding uosc/flash-timeline
f           frame-step
d           frame-back-step
# subs2srs
Alt+RIGHT script-binding mpvacious-sub-seek-forward; script-binding uosc/flash-timeline
Alt+LEFT  script-binding mpvacious-sub-seek-back;    script-binding uosc/flash-timeline
Alt+l     script-binding mpvacious-sub-seek-forward; script-binding uosc/flash-timeline
Alt+h     script-binding mpvacious-sub-seek-back;    script-binding uosc/flash-timeline

# playlist
PGDWN        playlist-next
PGUP         playlist-prev
n            playlist-next
p            playlist-prev
MBTN_FORWARD playlist-next
MBTN_BACK    playlist-prev
Shift+PGDWN  add playlist-pos 10
Shift+PGUP   add playlist-pos -10
Shift+n      add playlist-pos 10
Shift+p      add playlist-pos -10
>            add playlist-pos 100
<            add playlist-pos -100
;            show-text ${playlist}

# play/pause
Space         cycle pause
MBTN_LEFT_DBL cycle pause

# fullscreen
Shift+f cycle fullscreen
MBTN_MID cycle fullscreen

### uosc.lua start
enter      script-binding uosc/menu
menu       script-binding uosc/menu
MBTN_RIGHT script-binding uosc/menu
t          script-binding uosc/toggle-progress
tab        script-binding uosc/peek-timeline

## audio
a      script-binding uosc/audio                          #! Audio > Select
m      cycle mute                                         #! Audio > Mute
Ctrl+m cycle-values audio-channels "mono" "stereo"        #! Audio > Mono/Stereo
#      af toggle "lavfi=[pan=1c|c0=c0+-1*c1]"             #! Audio > Mute center channel
#      af toggle "lavfi=[pan=stereo|c0=0.7*c0|c1=0.3*c1]" #! Audio > L channel 30% louder
#      af toggle "lavfi=[pan=stereo|c0=0.3*c0|c1=0.7*c1]" #! Audio > R channel 30% louder

## subs
v            cycle sub-visibility               #! Subtitles > Toggle
s            script-binding uosc/subtitles      #! Subtitles > Select
Shift+s      script-binding uosc/load-subtitles #! Subtitles > Load external
r            add sub-scale 0.1                  #! Subtitles > + Size
Shift+r      add sub-scale -0.1                 #! Subtitles > - Size
z            add sub-delay +0.1                 #! Subtitles > Delay +100ms
Ctrl+z       add sub-delay +0.05                #! Subtitles > Delay +50ms
Shift+z      add sub-delay -0.1                 #! Subtitles > Delay -100ms
Shift+Ctrl+z add sub-delay -0.05                #! Subtitles > Delay -50ms
# subs2srs
Ctrl+s  script-binding mpvacious-menu-open             #! Subtitles > Subs2srs > Open menu
Ctrl+c  script-binding mpvacious-copy-sub-to-clipboard #! Subtitles > Subs2srs > Copy sub to clipboard
Ctrl+t  script-binding mpvacious-autocopy-toggle       #! Subtitles > Subs2srs > Toggle sub autocopy
Shift+m script-binding mpvacious-overwrite-last-note   #! Subtitles > Subs2srs > Overwrite last note
#       script-binding mpvacious-update-last-note      #! Subtitles > Subs2srs > Update last note
Ctrl+n  script-binding mpvacious-export-note           #! Subtitles > Subs2srs > Export note

## screenshots
Ctrl+e  async screenshot video #! Screenshot > Origin
Shift+e async screenshot       #! Screenshot > Viewport

## navigation
e            script-binding uosc/playlist          #! Navigate > Playlist
:            script-binding uosc/playlist
c            script-binding uosc/chapters          #! Navigate > Chapters
Shift+o      script-binding uosc/open-file         #! Navigate > Open file
Ctrl+Shift+o script-binding uosc/show-in-directory #! Navigate > Open containing dir

## misc
g       cycle-values loop-file "no" "inf"                                   #! Utils > Loop file
Ctrl+g  cycle-values loop-playlist "no" "inf"                               #! Utils > Loop playlist
Shift+g ab-loop                                                             #! Utils > A-B loop
Ctrl+I  cycle-values video-sync "audio" "display-resample"                  #! Utils > Toggle video-sync
Ctrl+i  cycle interpolation                                                 #! Utils > Toggle interpolation
Ctrl+o  cycle-values hwdec "no" "auto-safe"                                 #! Utils > Toggle hwdec
Ctrl+d  cycle deband                                                        #! Utils > Toggle deband
x       change-list glsl-shaders set "~~/shaders/ravu-lite-ar-r4.hook"      #! Utils > Shaders > ravu-lite-ar-r4
Shift+x change-list glsl-shaders set "~~/shaders/ravu-zoom-ar-r3.hook"      #! Utils > Shaders > ravu-zoom-ar-r3
Shift+c change-list glsl-shaders toggle "~~/shaders/noise_static_luma.hook" #! Utils > Shaders > Toggle grain
Shift+d change-list glsl-shaders set ""                                     #! Utils > Shaders > Disable all
Ctrl+r  write-watch-later-config; loadfile ${path}                          #! Utils > Refresh
q       script-binding uosc/stream-quality                                  #! Utils > Change stream quality
Shift+i script-binding stats/display-stats-toggle                           #! Utils > Stats

